spring.application.name=url_shortener

spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/url_shortener}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Redis Connection
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}

# Cache Configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=86400000

#spring.jpa.show-sql=true

jwt.secret=${JWT_SECRET}

#logging.level.org.springframework.web=DEBUG
#logging.level.org.springframework.http.converter.json=TRACE

spring.data.redis.password=${REDIS_PASSWORD:}

app.base-url=${APP_BASE_URL:http://localhost:8080}

server.port=${PORT:8080}